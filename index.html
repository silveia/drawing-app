<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toolbar">
        <div class="toolbar-group">
            <label for="brushType">tool</label>
            <select id="brushType">
                <option value="round">round brush</option>
                <option value="square">square brush</option>
                <option value="eraser">eraser</option>
            </select>
    
            <label>color <input type="color" id="colorPicker" value="#000000"></label>
            <label>size <input type="range" id="brushSize" min="1" max="50" value="5"></label>
        </div>
    
        <div class="toolbar-group">
            <label class="uploadBtn" for="imageLoader">upload stamp [shift]</label>
            <input type="file" id="imageLoader" accept="image/*">
    
            <label class="uploadBtn" for="charLoader">upload sprite</label>
            <input type="file" id="charLoader" accept="image/*" style="display: none;">
            
            <button id="spawnBtn">spawn sprite</button>
            <button id="saveBtn">save</button>
            <button id="loadBtn">load</button>
            <button id="clearBtn">clear</button>
            
            <button id="gameBtn" aria-label="Open Game Window">
                <img src="image.png" alt="icon" id="gameIcon">
            </button>
            <button id="browserBtn" aria-label="Open Browser Window">
                <img src="image-2.png" alt="icon" id="browserIcon">
            </button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas" width="1200" height="800"></canvas>
    </div>

    <div id="miniWindow" class="hidden-window">
        <div id="windowHeader">
            <span id="windowTitle">game</span>
            <button id="closeWindowBtn">X</button>
        </div>

        <div id="windowContent">
            <div id="startScreen">
                <button id="startGameBtn">start</button>
            </div>

            <div id="gameScreen" class="hidden-game-element">
                <div style="font-family: monospace; font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 10px;">
                    score: <span id="currentScore">0</span>
                </div>
                <div style="width: 100%; height: 400px; background-color: white; border: 2px solid #49393F; position: relative; overflow: hidden;">
                    <div id="gameTarget" style="width: 30px; height: 30px; background-color: #775F6C; border: 1px solid white; position: absolute; cursor: pointer;"></div>
                </div>
            </div>
        </div> 
    </div>

    <div id="miniWindow2" class="hidden-window" style="display: none; position: fixed; width: 400px; height: 400px;">
        <div id="windowHeader2" style="background-color: #49393F; padding: 5px; cursor: move;">
            <span>reference</span>
            <button id="closeWindowBtn2">X</button>
        </div>
        
        <div class="windowContent2">
            <button id="uploadBtn" type="button" aria-label="Upload Reference Image">
                <img src="upload.png" alt="Upload Icon" id="uploadIcon">
            </button>
            <input type="file" id="windowImageLoader" accept="image/*" style="display: none;">

            <img id="windowImagePreview" src="" alt="Preview">
            <span id="uploadPlaceholder">upload file to view it here</span>
        </div>
    </div>

    <script>
        window.initCustomGame = window.initCustomGame || function() { console.log("Placeholder game setup run!"); };
        window.stopCustomGame = window.stopCustomGame || function() { console.log("Placeholder game teardown run!"); };
    </script>
    <script src="game.js"></script>   
    <script src="script.js"></script> 
</body>
</html>
