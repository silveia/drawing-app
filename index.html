<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #toolbar {
            background-color: #333;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        label {
            color: white;
            font-size: 14px;
        }
        canvas {
            background-color: white;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: crosshair;
        }
        button {
            padding: 5px 15px;
            cursor: pointer;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover {
            background-color: #5a5a5a;
        }
        button.active {
            background-color: #2ed573; /* Green to show which tool is active */
        }
        #clearBtn {
            background-color: #ff4757;
        }
        #clearBtn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button id="brushBtn" class="active">Brush</button>
        <button id="eraserBtn">Eraser</button>
        <button id="pixelBtn">Pixel Art</button>
        <label>Color: <input type="color" id="colorPicker" value="#000000"></label>
        <label>Size: <input type="range" id="brushSize" min="1" max="50" value="5"></label>
        <button id="clearBtn">Clear Canvas</button>
    </div>

    <canvas id="paintCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const brushBtn = document.getElementById('brushBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const pixelBtn = document.getElementById('pixelBtn');

        let isDrawing = false;
        let currentTool = 'brush'; // Keeps track of 'brush' or 'eraser'

        // Tool Selection Logic
        brushBtn.addEventListener('click', () => {
            currentTool = 'brush';
            brushBtn.classList.add('active');
            eraserBtn.classList.remove('active');
        });

        eraserBtn.addEventListener('click', () => {
            currentTool = 'eraser';
            eraserBtn.classList.add('active');
            brushBtn.classList.remove('active');
        });
        pixelBtn.addEventListener('click', () => {
            currentTool = 'pixel';
            pixelBtn.classList.add('active');
            brushBtn.classList.remove('active');
            eraserBtn.classList.remove('active');
        });

        // Drawing Logic
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            draw(e);
        });

        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        function draw(e) {
            if (!isDrawing) return;

            // IF tool is brush, use color picker. IF eraser, use white.
            if (currentTool === 'brush') {
                ctx.strokeStyle = colorPicker.value;
            } else {
                ctx.strokeStyle = '#ffffff'; // White matches the canvas background
            }

            ctx.lineWidth = brushSize.value;
            if (currentTool === 'pixel') {
                ctx.lineCap = 'square';
                ctx.lineJoin = 'miter';
                ctx.imageSmoothingEnabled = false; // Tells the canvas not to blend pixels
            } else {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.imageSmoothingEnabled = true;
            }
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            ctx.beginPath();
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
