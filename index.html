<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div id="toolbar">
        <div class="toolbar-group">
            <label for="brushType">tool</label>
            <select id="brushType">
                <option value="round">round brush </option>
                <option value="square">square bruh</option>
                <option value="eraser">eraser</option>
            </select>
    
            <label>color    <input type="color" id="colorPicker" value="#000000"></label>
            <label>size   <input type="range" id="brushSize" min="1" max="50" value="5"></label>
        </div>
    
        <div class="toolbar-group">
            <label class="file-upload-btn" for="imageLoader">upload stamp [shift to spawn]</label>
            <input type="file" id="imageLoader" accept="image/*">
    
            <label class="file-upload-btn" for="charLoader">upload sprite </label>
            <input type="file" id="charLoader" accept="image/*" style="display: none;">
            
            <button id="spawnBtn">spawn sprite</button>
            <button id="clearBtn">clear</button>
            <button id="customImageBtn" aria-label="Custom Action">
                <img src="image.png" alt="icon" id="btnIcon">
            </button>
        </div>
    </div>
    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
