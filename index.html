<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #toolbar {
            background-color: #333;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        label {
            color: white;
            font-size: 14px;
        }
        canvas {
            background-color: white;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: crosshair;

            width: 90vw; /* screen takes up 90% of screen width */
            height: 70vh; /* screen takes up 70% of screen height */
            max-width: 1200px; /* prevents it from becoming too big if big screen size */
        }
        button {
            padding: 5px 15px;
            cursor: pointer;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover {
            background-color: #5a5a5a;
        }
        #clearBtn {
            background-color: #ff4757;
        }
        #clearBtn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="brushType">tool ^_^</label>
        <select id="brushType">
            <option value="round">Round Brush</option>
            <option value="square">Square Brush</option>
            <option value="eraser">Eraser</option>
        </select>

        <label>color :p<input type="color" id="colorPicker" value="#000000"></label>
        <label>size<input type="range" id="brushSize" min="1" max="50" value="5"></label>
        <button id="clearBtn">clear</button>
    </div>

    <canvas id="paintCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const brushType = document.getElementById('brushType');

        let isDrawing = false;
        let currentTool = 'round';
        // Function to match the internal resolution to the display size
        function resizeCanvas() {
            // Save what you've drawn so it doesn't instantly wipe out on resize
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
        
            // Set the internal pixel dimensions to match the CSS display dimensions
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        
            // Restore your drawings back onto the resized canvas
            ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, canvas.width, canvas.height);
        }
        
        resizeCanvas();
        
        // Automatically adjust the canvas if you resize the browser window
        window.addEventListener('resize', resizeCanvas);
        // Tool Selection Logic
        // Dropdown Selection Logic
        brushType.addEventListener('change', () => {
            currentTool = brushType.value; // Automatically sets currentTool to 'round', 'square', or 'eraser'
        });

        // Drawing Logic
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            draw(e);
        });

        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        function draw(e) {
            if (!isDrawing) return;
        
            // IF tool is round or square, use color picker. IF eraser, use white.
            if (currentTool === 'round' || currentTool === 'square') {
                ctx.strokeStyle = colorPicker.value;
            } else {
                ctx.strokeStyle = '#ffffff'; // White matches the canvas background
            }
        
            ctx.lineWidth = brushSize.value;
            
            // Set line styles based on the dropdown selection
            if (currentTool === 'square') {
                ctx.lineCap = 'square';
                ctx.lineJoin = 'miter';
                ctx.imageSmoothingEnabled = false; 
            } else {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.imageSmoothingEnabled = true;
            }

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            ctx.beginPath();
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
