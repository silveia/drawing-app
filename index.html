<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #toolbar {
            background-color: #333;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        label {
            color: white;
            font-size: 14px;
        }
        canvas {
            background-color: white;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: crosshair;

            width: 90vw; /* screen takes up 90% of screen width */
            height: 90vh; /* screen takes up 90% of screen height */
            max-width: 1200px; /* prevents it from becoming too big if big screen size */
        }
        button {
            padding: 5px 15px;
            cursor: pointer;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover {
            background-color: #5a5a5a;
        }
        #clearBtn {
            background-color: #ff4757;
        }
        #clearBtn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="brushType">tool :>  </label>
        <select id="brushType">
            <option value="round">round brush </option>
            <option value="square">square bruh</option>
            <option value="eraser">eraser</option>
        </select>

        <label>color :p  <input type="color" id="colorPicker" value="#000000"></label>
        <label>size  <input type="range" id="brushSize" min="1" max="50" value="5"></label>
        <button id="clearBtn">clear</button>
    </div>

    <canvas id="paintCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const brushType = document.getElementById('brushType');

        let isDrawing = false;
        let currentTool = 'round';
        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
        
            // Get the high-definition pixel scale factor of your monitor (Macs are usually 2x or 3x)
            const scale = window.devicePixelRatio || 1; 
        
            // Multiply the internal resolution by the high-definition scale factor
            canvas.width = canvas.clientWidth * scale;
            canvas.height = canvas.clientHeight * scale;
        
            // Scale the drawing context so your brush strokes don't shrink down
            ctx.scale(scale, scale);
        
            ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, canvas.clientWidth, canvas.clientHeight);
        }
        
        resizeCanvas();
        
        // Automatically adjust the canvas if you resize the browser window
        window.addEventListener('resize', resizeCanvas);
        // Tool Selection Logic
        // Dropdown Selection Logic
        brushType.addEventListener('change', () => {
            currentTool = brushType.value; // Automatically sets currentTool to 'round', 'square', or 'eraser'
        });

        // Drawing Logic
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            draw(e);
        });

        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        function draw(e) {
            if (!isDrawing) return;
        
            // IF tool is round or square, use color picker. IF eraser, use white.
            if (currentTool === 'round' || currentTool === 'square') {
                ctx.strokeStyle = colorPicker.value;
            } else {
                ctx.strokeStyle = '#ffffff'; // White matches the canvas background
            }
        
            ctx.lineWidth = brushSize.value;
            
            // Set line styles based on the dropdown selection
            if (currentTool === 'square') {
                ctx.lineCap = 'square';
                ctx.lineJoin = 'miter';
                ctx.imageSmoothingEnabled = false; 
            } else {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.imageSmoothingEnabled = true;
            }

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

    if (!canvas.lastX) {
                canvas.lastX = x;
                canvas.lastY = y;
            }
    
            // Calculate a midpoint between the last spot and the current spot
            const midX = (canvas.lastX + x) / 2;
            const midY = (canvas.lastY + y) / 2;
    
            ctx.beginPath();
            // Start the line at the previous midpoint
            ctx.moveTo(canvas.lastMidX || canvas.lastX, canvas.lastMidY || canvas.lastY);
            // Bend the line TOWARDS the old mouse point, ENDING at the new midpoint
            ctx.quadraticCurveTo(canvas.lastX, canvas.lastY, midX, midY);
            ctx.stroke();
            
            // Save the current midpoints so the next line segment connects perfectly
            canvas.lastMidX = midX;
            canvas.lastMidY = midY;
        }
    
        // Crucial: Reset the tracking variables when you lift your mouse up!
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            canvas.lastX = null;
            canvas.lastY = null;
            canvas.lastMidX = null; // <-- ADD THIS LINE
            canvas.lastMidY = null; // <-- ADD THIS LINE
            ctx.beginPath();
        });
        canvas.addEventListener('mouseout', () => {
            isDrawing = false;
            canvas.lastX = null;
            canvas.lastY = null;
            canvas.lastMidX = null; // <-- ADD THIS LINE
            canvas.lastMidY = null; // <-- ADD THIS LINE
            ctx.beginPath();
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
