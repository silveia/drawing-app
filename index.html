<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>draw</title>
    <style>
        #canvas-container {
            position: relative;
            margin-top: 20px;
        }
        canvas {
            /* Remove 'margin-top: 20px;' from your existing canvas CSS block, 
               since the container handles the spacing now! */
        }
        .shimeji-char {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none; /* Let's you click/draw right through them! */
            user-select: none;
            z-index: 5;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #toolbar {
            background-color: #333;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        label {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        canvas {
            background-color: white;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: crosshair;

            width: 90vw; /* screen takes up 90% of screen width */
            height: 90vh; /* screen takes up 90% of screen height */
            max-width: 1200px; /* prevents it from becoming too big if big screen size */
        }
        button, .file-upload-btn {
            padding: 5px 15px;
            cursor: pointer;
            background-color: #4a4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover, .file-upload-btn:hover {
            background-color: #5a5a5a;
        }
        #clearBtn {
            background-color: #ff4757;
        }
        #clearBtn:hover {
            background-color: #ff6b81;
        }
        /* Hide the ugly default file input */
        #imageLoader {
            display: none;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="brushType">tool :> </label>
        <select id="brushType">
            <option value="round">round brush </option>
            <option value="square">square bruh</option>
            <option value="eraser">eraser</option>
        </select>

        <label>color :p <input type="color" id="colorPicker" value="#000000"></label>
        <label>size <input type="range" id="brushSize" min="1" max="50" value="5"></label>
        
        <label class="file-upload-btn" for="imageLoader">upload stamp</label>
        <input type="file" id="imageLoader" accept="image/*">

        <label class="file-upload-btn" for="charLoader">upload character skin  </label>
        <input type="file" id="charLoader" accept="image/*" style="display: none;">
        <button id="spawnBtn">spawn character (*^^*)♡  </button>
        <button id="clearBtn">clear</button>
    </div>
    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const brushType = document.getElementById('brushType');
        const imageLoader = document.getElementById('imageLoader');
        const container = document.getElementById('canvas-container');
        const spawnBtn = document.getElementById('spawnBtn');
        const characters = []; // array to hold all the characters created
        let charImgUrl = 'https://i.imgur.com/vHqY7bM.png';   
        let isCharImageLoaded = false;
        const charLoader = document.getElementById('charLoader');

        let isDrawing = false;
        let currentTool = 'round';
        let mouseX = 0;
        let mouseY = 0;

        let stampImage = new Image();
        let isImageLoaded = false;

        stampImage.src = 'https://i.imgur.com/w983OOW.png'; 
        stampImage.onload = () => { isImageLoaded = true; };

        imageLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                stampImage = new Image();
                stampImage.onload = () => {
                    isImageLoaded = true;
                };
                stampImage.src = event.target.result;
            };
            if (e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        charLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                charImgUrl = event.target.result;
                isCharImageLoaded = true;
            };
            if (e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        });
        
        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tempCtx.drawImage(canvas, 0, 0);
        
            const scale = window.devicePixelRatio || 1; 
        
            canvas.width = canvas.clientWidth * scale;
            canvas.height = canvas.clientHeight * scale;
        
            ctx.scale(scale, scale);
        
            ctx.drawImage(tempCanvas, 0, 0, tempCanvas.width, tempCanvas.height, 0, 0, canvas.clientWidth, canvas.clientHeight);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        brushType.addEventListener('change', () => {
            currentTool = brushType.value;
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        const resetTracking = () => {
            isDrawing = false;
            canvas.lastX = null;
            canvas.lastY = null;
            canvas.lastMidX = null;
            canvas.lastMidY = null;
            ctx.beginPath();
        };

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            draw(e);
        });

        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', resetTracking);

        function draw(e) {
            if (!isDrawing || !e.clientX || !e.clientY) return;        
            
            if (currentTool === 'round' || currentTool === 'square') {
                ctx.strokeStyle = colorPicker.value;
            } else {
                ctx.strokeStyle = '#ffffff'; 
            }
        
            ctx.lineWidth = brushSize.value;
            
            if (currentTool === 'square') {
                ctx.lineCap = 'square';
                ctx.lineJoin = 'miter';
                ctx.imageSmoothingEnabled = false; 
            } else {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.imageSmoothingEnabled = true;
            }

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            mouseX = x;
            mouseY = y;

            if (!canvas.lastX) {
                canvas.lastX = x;
                canvas.lastY = y;
                canvas.lastMidX = x;
                canvas.lastMidY = y;
            }
        
            const midX = (canvas.lastX + x) / 2;
            const midY = (canvas.lastY + y) / 2;
        
            ctx.beginPath();
            ctx.moveTo(canvas.lastMidX, canvas.lastMidY);
            ctx.quadraticCurveTo(canvas.lastX, canvas.lastY, midX, midY);
            ctx.stroke();
            
            canvas.lastX = x;
            canvas.lastY = y;
            canvas.lastMidX = midX;
            canvas.lastMidY = midY;
        }

        // 3. Stamp file on 'S' keypress
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') {
                if (mouseX >= 0 && mouseX <= canvas.clientWidth && mouseY >= 0 && mouseY <= canvas.clientHeight) {
                    drawCustomShape(mouseX, mouseY);
                }
            }
        });

        function drawCustomShape(x, y) {
            if (!isImageLoaded) return; 
            
            ctx.save();
            
            // This pulls the slider size directly so your stamp scales with your brush slider!
            const dynamicSize = Number(brushSize.value) * 2.5; 
            
            const targetX = x - (dynamicSize / 2);
            const targetY = y - (dynamicSize / 2);
            
            ctx.drawImage(stampImage, targetX, targetY, dynamicSize, dynamicSize);
            
            ctx.restore();
        }
        class Shimeji {
            constructor() {
                // Choose a random horizontal starting position on the canvas width
                this.x = Math.random() * (canvas.clientWidth - 100);
                this.y = -50; // Start just above the canvas ceiling
                
                this.velocityY = 0; // Dropping velocity
                this.velocityX = (Math.random() - 0.5) * 2; // Random wandering velocity
                this.gravity = 0.4;
                this.bounceFactor = -0.3; // Cute impact landing bounce
                this.isGrounded = false;
                
                // Dynamically build an <img> element for this character
                this.element = document.createElement('img');
                this.element.src = charImgUrl;
                this.element.classList.add('shimeji-char');
                container.appendChild(this.element); // Pop it into the world container
                
                this.updateElementPosition();
            }
        
            update() {
                if (!this.isGrounded) {
                    // Physics math for falling
                    this.velocityY += this.gravity;
                    this.y += this.velocityY;
                    this.x += this.velocityX;
        
                    const floorLevel = canvas.clientHeight - 100;
                    
                    // Check if they hit the bottom edge of the white canvas space
                    if (this.y >= floorLevel) {
                        this.y = floorLevel;
                        this.velocityY = this.velocityY * this.bounceFactor; // Bounce up!
                        
                        // If they are barely bouncing anymore, set them to walk
                        if (Math.abs(this.velocityY) < 1) {
                            this.velocityY = 0;
                            this.isGrounded = true;
                            this.velocityX = (Math.random() > 0.5 ? 1 : -1) * 0.8; // Set pacing speed
                        }
                    }
                } else {
                    // Walking movement logic
                    this.x += this.velocityX;
        
                    // Bounce off left/right walls of the canvas
                    if (this.x <= 0) {
                        this.x = 0;
                        this.velocityX *= -1;
                    } else if (this.x >= canvas.clientWidth - 100) {
                        this.x = canvas.clientWidth - 100;
                        this.velocityX *= -1;
                    }
        
                    // Look right if moving right, flip image left if moving left
                    this.element.style.transform = this.velocityX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
                }
        
                this.updateElementPosition();
            }
        
            updateElementPosition() {
                // Move the actual HTML image across the screen using pixels
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }
        }
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
        spawnBtn.addEventListener('click', () => {
            if (!isCharImageLoaded) {
                alert("error - pls upload image"); // Optional alert message
                return; 
            }
            
            characters.push(new Shimeji());
        });
        
        function animationTick() {
            characters.forEach(char => char.update());
            requestAnimationFrame(animationTick);
        }
        requestAnimationFrame(animationTick);
    </script>
</body>
</html>
